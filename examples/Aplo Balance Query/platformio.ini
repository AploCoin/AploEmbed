[platformio]
src_dir = src
default_envs = esp32dev

[env]
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
lib_ldf_mode = deep+
lib_deps =
    https://github.com/AploCoin/AploEmbed.git#refactor/platform-specific-examples

[env:esp32dev]
platform = espressif32
board = esp32dev

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:esp12e]
platform = espressif8266
board = esp12e
